# Isolated Neo4j for the Guardian demo graph. Test data only — never connect
# this to any production database.
services:
  neo4j:
    image: neo4j:5.23
    container_name: guardian-neo4j
    ports:
      - "7474:7474" # browser
      - "7687:7687" # bolt
    environment:
      - NEO4J_AUTH=neo4j/guardian-demo
    volumes:
      - guardian_neo4j_data:/data

volumes:
  guardian_neo4j_data:
